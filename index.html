<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 | 我的主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            scroll-behavior: smooth;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.2);
            padding: 15px 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            transition: opacity 0.3s;
        }
        nav a:hover {
            opacity: 0.7;
        }
        /* 通用区块 */
        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px 0;
        }
        /* 首屏 */
        .hero {
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        /* 内容区块 */
        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        .content {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.9;
        }
        /* 技能列表 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        .skill-tag {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">我的主页</div>
            <div class="nav-links">
                <a href="#about">关于我</a>
                <a href="#skills">技能</a>
                <a href="#contact">联系我</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>你好，我是 [张之晓]</h1>
            <p>一名大连海事大学的学生，热爱编程与设计 / 开发者</p>
        </div>
    </section>

    <section id="about">
        <div class="container">
            <h2 class="section-title">关于我</h2>
            <div class="content">
                <p>我目前就读于 [计算机专业]，专注于 [前端开发、算法竞赛、设计]。</p>
                <p>喜欢用代码实现想法，也热爱分享知识，希望能通过技术创造更美好的生活。</p>
            </div>
        </div>
    </section>

    <section id="skills">
        <div class="container">
            <h2 class="section-title">我的技能</h2>
            <div class="skills">
                <div class="skill-tag">C++</div>
                <div class="skill-tag">Python</div>
                <div class="skill-tag">CSS</div>
                <div class="skill-tag">linux基础命令</div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <div class="content">
                <p>邮箱：1931555455@qq.com</p>
                <p>GitHub：github.com/xiao-00-00</p>
            </div>
        </div>
    </section>
</body>
</html>
